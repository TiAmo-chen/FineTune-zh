name: Build Unsigned Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

          # Update version in project
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $VERSION/g" FineTune.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${{ github.run_number }}/g" FineTune.xcodeproj/project.pbxproj

      - name: Build Release (unsigned)
        run: |
          xcodebuild build \
            -project FineTune.xcodeproj \
            -scheme FineTune \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal

          # Find the built app in DerivedData
          APP_PATH=$(find build/DerivedData -name "FineTune.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Create DMG
        run: |
          # Create DMG with Applications symlink
          mkdir -p dmg_temp
          cp -r "$APP_PATH" dmg_temp/
          ln -s /Applications dmg_temp/Applications

          # Create DMG
          hdiutil create -volname "FineTune" -srcfolder dmg_temp -ov -format UDZO "FineTune-${{ env.VERSION }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: FineTune-${{ env.VERSION }}.dmg
          body: |
            ## FineTune 汉化版 ${{ env.VERSION }}
            
            ### 安装方法
            1. 下载 `FineTune-${{ env.VERSION }}.dmg`
            2. 打开 DMG，将 FineTune 拖到 Applications
            3.首次运行时，右键点击 → 打开（绕过 Gatekeeper）
            
            ### 功能
            - 独立控制每个应用的音量
            - 音量增强（最高 4 倍）
            - 10段 EQ 均衡器
            - AutoEQ 耳机校正
            - 多设备同时输出
            - 蓝牙设备管理
            
            ### 注意
            - 未签名版本，首次运行需要右键打开
            - 需要授予「屏幕与系统音频录制」权限
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}